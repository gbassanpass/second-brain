# Apenas serviços auxiliares. Postgres/Storage/Auth vêm do Supabase CLI
# (`supabase start`), não do docker-compose.
services:
  redis:
    image: redis:7-alpine
    container_name: second-brain-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

volumes:
  redis-data:
