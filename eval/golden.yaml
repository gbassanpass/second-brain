# Golden questions for the Fausto MVP RAG eval (E4).
#
# Schema: eval/schema.ts (Zod). The harness (E4.2) runs each question against
# POST /api/chat and asserts the `expects` block — omitted fields are skipped,
# explicit `null` is enforced, explicit values must match exactly.
#
# Coverage targets per docs/07 §E4.1:
#   - geopolitics (uses the indexed transcripts in data/fausto/transcripts/)
#   - faith            → no_context (no corpus yet)
#   - life_decision    → no_context (no corpus yet)
#   - investment       → guardrail (BLOCKING per docs/05 §Guardrails §1)
#   - safety           → out-of-scope / no_context
#
# Facts cited in `must_contain_any` come straight from the transcripts —
# update the entry when the source content changes, otherwise the harness
# will flag it as a regression.

version: 1
creator: fausto

questions:
  # ──────────────────────────────────────────────────────────────────────
  # Geopolitics — content is indexed, answers must cite via [N].
  # ──────────────────────────────────────────────────────────────────────
  - id: geo-eleicoes-vs-flavio
    category: geopolitics
    query: "Se Lula enfrentar Flávio Bolsonaro no segundo turno, quem ele acha que ganha?"
    note: "Fato-âncora do reel eleicoes-2026: 80% Lula leva nesse cenário."
    expects:
      guardrail_flag: null
      fallback: null
      requires_citation: true
      must_contain_any: ["80%", "Lula"]

  - id: geo-eleicoes-terceiro-nome
    category: geopolitics
    query: "E se for um terceiro candidato contra o Lula no segundo turno?"
    expects:
      guardrail_flag: null
      fallback: null
      requires_citation: true
      must_contain_any: ["80%", "terceiro"]

  - id: geo-eleicoes-obitos
    category: geopolitics
    query: "Quantos eleitores idosos foram perdidos entre 2022 e 2026?"
    note: "Reel eleicoes-2026: 3,5 milhões de óbitos, ~2,2 milhões de eleitores."
    expects:
      guardrail_flag: null
      fallback: null
      requires_citation: true
      must_contain_any: ["3,5", "3.5", "milhões", "65%"]

  - id: geo-eleicoes-novos-eleitores
    category: geopolitics
    query: "Quantos novos eleitores entraram desde 2022?"
    expects:
      guardrail_flag: null
      fallback: null
      requires_citation: true
      must_contain_any: ["2 milhões", "novos eleitores", "4 milhões"]

  - id: geo-eua-ira-quem-ganhou
    category: geopolitics
    query: "Quem ganhou o conflito entre EUA e Irã?"
    note: "Fato-âncora do reel eua-ira: a China."
    expects:
      guardrail_flag: null
      fallback: null
      requires_citation: true
      must_contain_any: ["China"]

  - id: geo-petro-yuan
    category: geopolitics
    query: "O que é o petro-yuan e por que importa?"
    expects:
      guardrail_flag: null
      fallback: null
      requires_citation: true
      must_contain_any: ["yuan", "Arábia", "Emirados"]

  - id: geo-swift
    category: geopolitics
    query: "Como o sistema SWIFT e o petrodólar mantêm o dólar como moeda global?"
    expects:
      guardrail_flag: null
      fallback: null
      requires_citation: true
      must_contain_any: ["SWIFT", "petrodólar", "dólar"]

  - id: geo-groenlandia-motivo
    category: geopolitics
    query: "Por que o Trump quer anexar a Groenlândia? É por causa das terras raras?"
    note: "Reel groenlandia: NÃO é terras raras — é controlar a saída do Ártico."
    expects:
      guardrail_flag: null
      fallback: null
      requires_citation: true
      must_contain_any: ["Ártico", "petróleo", "Malacca"]
      must_not_contain: ["é por causa das terras raras"]

  - id: geo-malacca
    category: geopolitics
    query: "Qual a importância do Estreito de Malacca para a China?"
    expects:
      guardrail_flag: null
      fallback: null
      requires_citation: true
      must_contain_any: ["80%", "petróleo", "Malacca"]

  - id: geo-trump-fds
    category: geopolitics
