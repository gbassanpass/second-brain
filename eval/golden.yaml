      guardrail_flag: null
      fallback: null
      requires_citation: true
      must_contain_any: ["81%", "endividadas"]

  # ──────────────────────────────────────────────────────────────────────
  # Faith — no corpus yet, MUST refuse via no_context.
  # ──────────────────────────────────────────────────────────────────────
